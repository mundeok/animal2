<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>동물의 세계 - 풀터치 마스터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">
    <style>
        #fade-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'NeoDunggeunmo', monospace; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #111827; display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden; touch-action: none; }
        .game-container { width: 100vw; height: 100dvh; background-color: #4ade80; display: flex; flex-direction: column; align-items: center; position: relative; }
        .view-section { width: 100%; height: 100%; display: none; flex-direction: column; padding: 20px; align-items: center; justify-content: center; }

        /* ================= MAP 시스템 ================= */
        #map-view { display: flex; padding-bottom: calc(clamp(120px, 20vmin, 175px) + 3vmin + env(safe-area-inset-bottom, 20px) + 20px); }
        .map-wrapper { width: min(70vmin, calc(100dvh - clamp(120px, 20vmin, 175px) - 4vmin - env(safe-area-inset-bottom, 20px) - 80px)); max-width: 70vmin; height: min(70vmin, calc(100dvh - clamp(120px, 20vmin, 175px) - 4vmin - env(safe-area-inset-bottom, 20px) - 80px)); background-color: #000; padding: 10px; border-radius: 10px; position: relative; display: flex; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); }
        .map-screen { width: 100%; height: 100%; background-color: #d2b48c; position: relative; overflow: hidden; border: 4px solid #fff; image-rendering: pixelated; transition: background-color 0.5s; cursor: crosshair; }
        .grid-container { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }
        .tile { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 3vmin; border: none !important; outline: none !important; }

        /* 🎨 타일 매핑 */
        .tile-rock { background-color: transparent !important; background-image: url('static/sand.png'); background-size: cover; image-rendering: pixelated; border: none !important; position: relative; z-index: 10; }
        .tile-rock::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('static/rock.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; transform: scale(1.8); transform-origin: bottom center; filter: drop-shadow(0 6px 4px rgba(0, 0, 0, 0.5)); }
        .tile-dirt { background-color: transparent; background-image: url('static/dirt.png'); background-size: cover; image-rendering: pixelated; border: none !important; outline: none !important; }
        .tile-grass { background-color: #4ade80; background-image: url('static/grass.png'); background-size: cover; image-rendering: pixelated; }
        .tile-flower { background-color: #34d399; background-image: url('static/flower.png'); background-size: cover; image-rendering: pixelated; }
        .tile-tree { background-image: url('static/tree.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; image-rendering: pixelated; color: transparent; transform: scale(1.4); transform-origin: bottom center; position: relative; z-index: 15; filter: drop-shadow(1px 2px 2px rgba(0, 0, 0, 0.35)); }
        .tile-school { background-color: #94a3b8; border: 2px solid #64748b; }
        .tile-door { background-color: #1e293b; }
        .tile-water { background-color: #3b82f6; background-image: url('static/water.png'); background-size: cover; image-rendering: pixelated; border: none !important; box-shadow: inset 0 0 12px rgba(0, 30, 100, 0.6); }
        .tile-lilypad { background-color: transparent; background-image: url('static/lilypad.png'); background-size: cover; image-rendering: pixelated; }
        .tile-bridge { background-color: transparent; background-image: url('static/bridge.png'); background-size: cover; image-rendering: pixelated; border: none !important; z-index: 2; }
        .tile-wetgrass { background-color: transparent; background-image: url('static/grass.png'); background-size: cover; image-rendering: pixelated; filter: brightness(0.85); transform: scale(1.15); z-index: 2; border-radius: 4px; box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4); }
        .tile-portal { background-color: #f59e0b; background-image: url('static/portal.png'); background-size: cover; image-rendering: pixelated; animation: pulse 1.5s infinite; color: transparent; }
        .tile-sand { background-color: transparent; background-image: url('static/sand.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-cactus { background-color: transparent !important; background-image: url('static/sand.png'); background-size: cover; image-rendering: pixelated; border: none !important; position: relative; z-index: 5; }
        .tile-cactus::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('static/cactus.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; transform: scale(1.4); transform-origin: bottom center; filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.2)); }
        .tile-palmtree { background-image: url('static/palm_tree.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; transform: scale(1.8); z-index: 15; filter: drop-shadow(2px 4px 4px rgba(0, 0, 0, 0.3)); }
        .tile-snow { background-color: #f8fafc; background-image: url('static/snow.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-snowtree { background-color: transparent !important; background-image: url('static/snow.png'); background-size: cover; position: relative; z-index: 15; border: none !important; }
        .tile-snowtree::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('static/snow_tree.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; transform: scale(2.2); transform-origin: bottom center; filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.5)); }
        .tile-igloo { background-color: transparent !important; background-image: url('static/snow.png'); background-size: cover; position: relative; z-index: 10; border: none !important; }
        .tile-igloo::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('static/igloo.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; transform: scale(2.0); transform-origin: bottom center; filter: drop-shadow(0 5px 4px rgba(0, 0, 0, 0.4)); }
        .tile-ice { background-color: #bae6fd; background-image: url('static/ice.png'); background-size: cover; image-rendering: pixelated; border: none !important; outline: none !important; box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.9), inset 2px 2px 5px rgba(0, 50, 150, 0.2); }
        .tile-lab-floor { background-color: transparent; background-image: url('static/lab_floor.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-wall { background-color: transparent; background-image: url('static/wall.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-desk { background-image: url('static/lab_floor.png'); background-size: cover; position: relative; border: none !important; }
        .tile-desk::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('static/desk.png'); background-size: contain; background-repeat: no-repeat; background-position: center; image-rendering: pixelated; filter: drop-shadow(2px 4px 4px rgba(0, 0, 0, 0.3)); transform: scale(1.3); z-index: 5; }
        .tile-npc { background-image: url('static/lab_floor.png'); background-size: cover; position: relative; border: none !important; color: transparent; }
        .tile-npc::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('static/npc_doc.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; image-rendering: pixelated; filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.4)); transform: scale(1.6); transform-origin: bottom center; z-index: 10; }
        .tile-deepdirt { background-color: transparent; background-image: url('static/deepdirt.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-root { background-color: transparent; background-image: url('static/root.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-hole { background-color: transparent; background-image: url('static/hole.png'); background-size: cover; border: none !important; box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8); border-radius: 50%; }
        .tile-ladder { background-color: #5d4037; background-image: url('static/ladder.png'); background-size: cover; border-left: 4px solid #d97706; border-right: 4px solid #d97706; }
        .tile-mud { background-color: transparent; background-image: url('static/mud.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-seaweed { background-color: transparent; background-image: url('static/seaweed.png'); background-size: cover; image-rendering: pixelated; border: none !important; }
        .tile-deepsea { background-color: transparent; background-image: url('static/deepsea.png'); background-size: cover; image-rendering: pixelated; border: none !important; }

        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.4; } }

        #player { position: absolute; width: calc(100% / 16 * 1.6); height: calc(100% / 16 * 2.0); margin-top: calc(-100% / 16 * 0.8); margin-left: calc(-100% / 16 * 0.3); display: flex; justify-content: center; align-items: center; z-index: 20; transition: top 0.1s linear, left 0.1s linear; background-image: url('static/player_sprite.png'); background-size: 600% 400%; background-repeat: no-repeat; image-rendering: pixelated; color: transparent; }

        /* 🚀 하단 터치 UI 영역 완벽 고정 */
        .map-ui-bottom { position: fixed; bottom: calc(3vmin + env(safe-area-inset-bottom, 20px)); left: 50%; transform: translateX(-50%); width: 90vw; max-width: 800px; display: flex; align-items: flex-end; gap: 2vmin; z-index: 100; pointer-events: auto; }
        .message-box-map { flex: 1; height: clamp(120px, 20vmin, 175px); background-color: #fff; border: 6px solid #000; border-radius: 8px; padding: 10px 15px; font-size: clamp(14px, 3vmin, 20px); line-height: 1.5; overflow-y: auto; font-weight: bold; word-break: keep-all; scroll-behavior: smooth; }
        .ui-buttons-container { display: flex; flex-direction: column; gap: 1.5vmin; flex-shrink: 0; }
        .btn-ui { padding: 1.5vmin 3vmin; border: 4px solid #000; border-radius: 8px; color: white; font-size: clamp(14px, 2.5vmin, 22px); box-shadow: 0 4px #000; text-align: center; cursor: pointer; font-weight: bold; }
        .btn-ui:active { transform: translateY(4px); box-shadow: 0 0 #000; }
        .pokedex-btn { background: #ef4444; }
        .reset-btn { background: #64748b; }

        /* ================= D-PAD 조이스틱 ================= */
        #dpad { position: fixed; bottom: calc(clamp(120px, 20vmin, 175px) + 3vmin + env(safe-area-inset-bottom, 20px) + 10px); left: 3vmin; width: min(28vmin, 160px); height: min(28vmin, 160px); z-index: 150; display: grid; grid-template-areas: ". up ." "left . right" ". down ."; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 3px; opacity: 0.85; pointer-events: auto; }
        .dpad-btn { display: flex; align-items: center; justify-content: center; background: rgba(20,20,20,0.65); border: 3px solid rgba(255,255,255,0.55); border-radius: 8px; color: white; font-size: min(6vmin, 28px); cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: none; box-shadow: 0 3px 8px rgba(0,0,0,0.5); transition: background 0.1s, transform 0.1s; }
        .dpad-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.88); }
        .dpad-up { grid-area: up; }
        .dpad-left { grid-area: left; }
        .dpad-right { grid-area: right; }
        .dpad-down { grid-area: down; }

        .status-bar { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 15px; border-radius: 8px; font-size: 18px; z-index: 50; border: 2px solid #fff; }

        /* ================= BATTLE 시스템 ================= */
        #battle-view { background: rgba(0, 0, 0, 0.95); position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; display: none; justify-content: center; align-items: center; }
        .battle-container { width: min(800px, 95vw); height: min(600px, 92vh); background-color: #f8f8f8; border: 8px solid #1a1a1a; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .battle-field { flex: 1; min-height: 0; width: 100%; position: relative; background: #f8f8f8; border-bottom: 6px solid #1a1a1a; overflow: hidden; }
        .battle-field::before { content: ''; position: absolute; bottom: 30px; left: 40px; width: 280px; height: 70px; background: #e2e8f0; border-radius: 50%; }
        .battle-field::after { content: ''; position: absolute; top: 170px; right: 40px; width: 220px; height: 60px; background: #e2e8f0; border-radius: 50%; }
        .battle-field.garden { background: linear-gradient(to bottom, #d9f99d 0%, #ffffff 100%); }
        .battle-field.pond { background: linear-gradient(to bottom, #bae6fd 0%, #ffffff 100%); }
        .battle-field.desert { background: linear-gradient(to bottom, #fef08a 0%, #ffffff 100%); }
        .battle-field.polar { background: linear-gradient(to bottom, #f1f5f9 0%, #ffffff 100%); }
        .battle-field.sea { background: linear-gradient(to bottom, #818cf8 0%, #ffffff 100%); }
        .battle-field.underground { background: linear-gradient(to bottom, #8b5cf6 0%, #ffffff 100%); }

        #weather-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 12; overflow: hidden; }
        .snow-particle { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10px) translateX(0); } 100% { transform: translateY(420px) translateX(20px); } }
        .sand-wind { position: absolute; width: 200%; height: 100%; background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.1), transparent); animation: wind 3s linear infinite; }
        @keyframes wind { 0% { transform: translateX(-50%); } 100% { transform: translateX(0%); } }

        .sprite-enemy { position: absolute; top: max(20px, 3vmin); right: max(30px, 4vmin); width: min(200px, 28vmin); height: min(200px, 28vmin); background-size: contain; background-repeat: no-repeat; background-position: bottom center; image-rendering: pixelated; animation: float 2s infinite ease-in-out; z-index: 5; }
        .enemy-status { position: absolute; top: max(15px, 2vmin); left: max(15px, 2vmin); width: min(320px, 48%); background: #fff; border: 6px solid #1a1a1a; border-radius: 8px; border-bottom-right-radius: 20px; padding: clamp(6px, 1.2vmin, 10px) clamp(8px, 1.5vmin, 15px); z-index: 15; display: none; }
        .sprite-player { position: absolute; bottom: max(20px, 3vmin); left: max(30px, 4vmin); width: min(240px, 32vmin); height: min(240px, 32vmin); background-image: url('static/player_back.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; image-rendering: pixelated; z-index: 10; transform: none; }
        .player-status { position: absolute; bottom: max(10px, 2vmin); right: max(15px, 2vmin); width: min(340px, 48%); background: #fff; border: 6px solid #1a1a1a; border-radius: 8px; border-top-left-radius: 20px; padding: clamp(6px, 1.2vmin, 10px) clamp(8px, 1.5vmin, 15px); z-index: 15; display: none; }

        .hp-container, .exp-container { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .hp-label, .exp-label { font-size: clamp(11px, 2vmin, 18px); font-weight: bold; width: clamp(28px, 4vmin, 35px); text-shadow: 1px 1px #000; }
        .hp-label { color: #fbbf24; }
        .exp-label { font-size: clamp(10px, 1.6vmin, 14px); color: #3b82f6; }
        .hp-bar-bg, .exp-bar-bg { flex: 1; background: #1a1a1a; padding: 2px; border-radius: 6px; }
        .hp-bar-bg { height: 16px; } .exp-bar-bg { height: 10px; }
        .hp-fill, .exp-fill { height: 100%; transition: width 0.5s; border-radius: 3px; }
        .hp-fill { background: #22c55e; width: 100%; } .exp-fill { background: #3b82f6; width: 0%; }

        .ui-panel { height: min(200px, 35vh); width: 100%; display: flex; background: #fff; cursor: pointer; flex-shrink: 0; }
        .message-box-battle { flex: 1; padding: clamp(8px, 2vmin, 15px) clamp(10px, 2.5vmin, 25px) clamp(10px, 2.5vmin, 25px); font-size: clamp(13px, 2.6vmin, 26px); line-height: 1.5; display: flex; flex-direction: column; justify-content: flex-start; position: relative; height: 100%; overflow-y: auto; max-height: min(190px, 33vh); }
        .message-box-battle.split { flex: 1.3; border-right: 6px solid #1a1a1a; font-size: clamp(13px, 2.6vmin, 26px); }
        .action-menu, .quiz-box { flex: 1; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; display: none; }
        .menu-item { display: flex; align-items: center; justify-content: flex-start; font-size: clamp(13px, 2vw, 22px); font-weight: bold; cursor: pointer; white-space: nowrap; background: #f0f9ff; border: 3px solid #1a1a1a; border-radius: 10px; box-shadow: 0 3px 0 #1a1a1a; color: #1a1a1a; padding: 6px 12px; transition: transform 0.1s, box-shadow 0.1s; -webkit-tap-highlight-color: transparent; }
        .menu-item:active { transform: translateY(3px); box-shadow: 0 0 0 #1a1a1a; }
        .menu-item::before { content: '▶'; margin-right: 8px; color: #3b82f6; }
        .menu-item:hover::before { opacity: 1; }
        .blink-cursor { position: absolute; bottom: clamp(8px, 2vmin, 15px); right: clamp(10px, 2.5vmin, 25px); font-size: clamp(16px, 3vmin, 28px); animation: blink 0.8s infinite; }
        .ui-panel.waiting { animation: panelPulse 1.4s ease-in-out infinite; }
        @keyframes panelPulse { 0%, 100% { background: #fff; } 50% { background: #dbeafe; } }

        @keyframes blink { 50% { opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .result-msg { color: white; font-size: 36px; text-align: center; border: 6px solid white; background: #1a1a1a; padding: 30px; border-radius: 12px; line-height: 1.5; margin-bottom: 20px; }
        .level-up-msg { color: #fbbf24; font-size: 44px; font-weight: bold; text-shadow: 2px 2px #ef4444; display: none; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ================= POKEDEX 시스템 ================= */
        #pokedex-view { background: rgba(0, 0, 0, 0.9); position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 700; display: none; justify-content: center; align-items: center; }
        .pokedex-container { width: 850px; height: 600px; background: #c23e3e; border: 10px solid #1a1a1a; border-radius: 20px; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); max-width: 95vw; max-height: 95vh; }
        .dex-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; color: white; font-size: 24px; font-weight: bold; }
        .dex-main { display: flex; flex: 1; gap: 15px; margin-top: 10px; overflow: hidden; }
        .dex-list { flex: 0.7; background: #fff; border: 5px solid #1a1a1a; overflow-y: auto; padding: 5px; border-radius: 10px; }
        .dex-item { padding: 12px; font-size: 20px; cursor: pointer; border-bottom: 2px solid #eee; display: flex; align-items: center; gap: 10px; color: #333; }
        .dex-item.active { background: #ffeb3b; border: 3px solid #1a1a1a; font-weight: bold; }
        .dex-detail-view { flex: 1.3; background: #fff; border: 5px solid #1a1a1a; display: flex; flex-direction: column; padding: 20px; border-radius: 10px; overflow-y: auto; }
        .dex-top-row { display: flex; gap: 20px; border-bottom: 4px solid #1a1a1a; padding-bottom: 15px; }
        .dex-sprite-box { width: 160px; height: 160px; background: #f3f4f6; border: 4px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; }
        .dex-pixel-art { width: 120px; height: 120px; background-size: contain; background-repeat: no-repeat; background-position: center; image-rendering: pixelated; }
        .dex-stats { flex: 1; color: #1a1a1a; }
        #dex-name { font-size: 32px; margin-bottom: 5px; border-bottom: 3px solid #1a1a1a; }
        .dex-physique p { font-size: 18px; margin-bottom: 5px; line-height: 1.4; }
        .dex-description-box { margin-top: 15px; padding: 15px; background: #f9fafb; border: 3px solid #1a1a1a; font-size: 22px; line-height: 1.6; border-radius: 8px; color: #1a1a1a; overflow-y: auto; }
        .badge-section { margin-top: 15px; border-top: 2px dashed #ccc; padding-top: 10px; }
        .badge-list { display: flex; flex-wrap: wrap; gap: 5px; }

        @keyframes catchPulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        @keyframes shakeMonster { 0% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
        .monster-hit { animation: shakeMonster 0.4s; }
        .monster-caught { animation: catchPulse 0.6s; }
        @keyframes enemyEntrance { 0% { opacity:0; transform:translateX(180px) scale(0.65); } 55% { opacity:1; transform:translateX(-12px) scale(1.07); } 78% { transform:translateX(6px) scale(0.97); } 100% { opacity:1; transform:translateX(0) scale(1); } }
    </style>
</head>

<body>
    <div id="badge-popup" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 15px 25px; border: 4px solid #fbbf24; border-radius: 10px; z-index: 2000; display: none; text-align: center; font-size: 20px;"></div>
    <div id="encounter-flash" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:5000; pointer-events:none; opacity:0;"></div>
    
    <div class="game-container">
        <div id="map-view" class="view-section">
            <div class="status-bar" id="ride-status">👟 도보 탐사 중 | 🏅 <span id="badge-count-text">0</span>개</div>
            
            <div class="map-wrapper">
                <div class="map-screen" id="map-bg">
                    <div id="fade-overlay"></div>
                    <div class="grid-container" id="map-grid"></div>

        function showNamePrompt(message, defaultVal, callback) {
            const modal = document.getElementById('modal-name');
            const input = document.getElementById('modal-name-input');
            document.getElementById('modal-name-msg').textContent = message;
            input.value = defaultVal || '';
            modal.style.display = 'flex';
            setTimeout(() => input.focus(), 150);
            const onOk = () => {
                modal.style.display = 'none';
                document.getElementById('modal-name-ok').removeEventListener('click', onOk);
                callback(input.value.trim() || null);
            };
            document.getElementById('modal-name-ok').addEventListener('click', onOk);
            input.addEventListener('keydown', function onEnter(e) {
                if (e.key === 'Enter') { input.removeEventListener('keydown', onEnter); onOk(); }
            });
        }

        function showConfirm(message, callback) {
            const modal = document.getElementById('modal-confirm');
            document.getElementById('modal-confirm-msg').textContent = message;
            modal.style.display = 'flex';
            const yes = document.getElementById('modal-confirm-yes');
            const no = document.getElementById('modal-confirm-no');
            const cleanup = () => { modal.style.display = 'none'; yes.onclick = null; no.onclick = null; };
            yes.onclick = () => { cleanup(); callback(true); };
            no.onclick = () => { cleanup(); callback(false); };
        }

        function saveGame() {

            localStorage.setItem('beastGame_player', JSON.stringify(data));

        function loadGame() {

                if (sAnimals) sAnimals.forEach(k => { if (animalDB[k]) animalDB[k].isCaught = true; });
                if (sData) {
                    pLevel = sData.pLevel || 1; pExp = sData.pExp || 0; maxExp = sData.maxExp || 100;
                    inventory = sData.inventory || inventory; earnedBadges = sData.earnedBadges || [];

                    isTutorialDone = sData.isTutorialDone || false;

        }

                    const dir = btn.dataset.dir;

                if (Math.abs(x - cx) > Math.abs(y - cy)) return (x - cx) > 0 ? 'right' : 'left';

                }

                if (caught >= 15 && inventory["마스터 포충망"] === 0 && !earnedBadges.includes("master_net_received")) {
                    msg("👨‍🔬 박사: 오오! 벌써 15마리나 잡았군!<br>보상으로 <span style='color:#facc15;'>[마스터 포충망]</span>을 주겠네! 100% 확률이지!");
                    inventory["마스터 포충망"] = 1;
                    earnedBadges.push("master_net_received");
                    saveGame();
                    return;
                }

                if (inventory["포충망"] < 2) {
                    msg("👨‍🔬 박사: 포충망을 다 썼나? <br>자! 여기 10개 더 가져가게!");
                    inventory["포충망"] = 10;
                    saveGame();
                    return;
                }
                msg(`👨‍🔬 박사: 훌륭해! 현재 도감을 ${caught}마리 채웠군!`);
                return;
            }
            
            if (mapName !== 'lab' && t !== 10 && t !== 5 && Math.random() < 0.04) {
                let foundItem = "포충망";
                if (mapName === 'pond' || mapName === 'sea') foundItem = "물고기 떡밥";
                else if (mapName === 'desert' || mapName === 'polar' || mapName === 'underground') foundItem = "특제 영양식";

                locked = true; 
                inventory[foundItem]++;
                saveGame();
                msg(`✨ 앗! 발밑에서 무언가 반짝인다!<br><b>[${foundItem}]</b>을(를) 1개 주웠다!`);
                setTimeout(() => { locked = false; }, 1200);
                return;
            }

            if (mapName === 'garden') { if (t === 1) a = ran < 0.3 ? "달팽이" : (ran < 0.6 ? "메뚜기" : (ran < 0.9 ? "무당벌레" : "사마귀")); else if (t === 2) a = ran < 0.5 ? "배추흰나비" : "벌"; }
            else if (mapName === 'underground' && (t === 24 || t === 25)) { a = ran < 0.3 ? "개미" : (ran < 0.6 ? "지렁이" : (ran < 0.8 ? "매미 애벌레" : (ran < 0.95 ? "땅강아지" : "두더지"))); }
            else if (mapName === 'pond') {
                if (t === 9 && !hasFrog) a = "개구리";
                else if (t === 7) a = ran < 0.4 ? "소금쟁이" : (ran < 0.7 ? "잠자리" : "물방개");
                else if (t === 6 && hasFrog) a = ran < 0.25 ? "붕어" : (ran < 0.5 ? "미꾸라지" : (ran < 0.75 ? "수달" : "다슬기"));
            }
            else if (mapName === 'desert' && t === 13) { a = ran < 0.25 ? "낙타" : (ran < 0.5 ? "사막여우" : (ran < 0.7 ? "도마뱀" : (ran < 0.85 ? "전갈" : "이집트 땅거북"))); }
            else if (mapName === 'polar') { if (t === 14) a = ran < 0.5 ? "순록" : (ran < 0.8 ? "북극여우" : "펭귄"); else if (t === 15) a = ran < 0.3 ? "펭귄" : (ran < 0.6 ? "순록" : (ran < 0.8 ? "북극여우" : "북극곰")); else if (t === 17) a = ran < 0.7 ? "바다표범" : "펭귄"; }
            else if (mapName === 'sea') { if (t === 27) a = ran < 0.35 ? "게" : (ran < 0.7 ? "짱뚱어" : (ran < 0.85 ? "조개" : "상어")); else if (t === 28 || t === 29) a = ran < 0.5 ? "조개" : "상어"; }

            if (a && Math.random() < 0.3) battle(a);
        }

        function msg(t) { const b = document.getElementById('msg-box'); b.innerHTML = t; b.scrollTop = 0; }

        function battle(a) {
            locked = true; curA = a; stg = 0; hp = 100;
            const fl = document.getElementById('encounter-flash');
            if (fl) { fl.style.transition = 'none'; fl.style.opacity = '1'; fl.style.display = 'block'; setTimeout(() => { fl.style.transition = 'opacity 0.5s'; fl.style.opacity = '0'; setTimeout(() => fl.style.display = 'none', 500); }, 200); }
            observeUsedInBattle = false;
            isObserveBuffActive = false;
            
            const allQuizzes = [...animalDB[a].q]; 
            allQuizzes.sort(() => Math.random() - 0.5); 
            currentBattleQuizzes = allQuizzes.slice(0, 3); 

            document.getElementById('map-view').style.display = 'none';
            document.getElementById('battle-view').style.display = 'flex';

            const field = document.querySelector('.battle-field');
            field.className = 'battle-field ' + mapName;

            const enemySprite = document.getElementById('enemy-sprite');
            const playerSprite = document.getElementById('player-sprite');
            enemySprite.innerText = "";
            playerSprite.innerText = "";

            enemySprite.style.backgroundImage = `url('static/${fullFileMap[a] || "ant.png"}')`;
            enemySprite.style.animation = 'enemyEntrance 0.75s cubic-bezier(0.15, 0.85, 0.3, 1.1) forwards';
            setTimeout(() => { enemySprite.style.animation = 'float 2s infinite ease-in-out'; }, 820);
            document.getElementById('enemy-name').innerText = `야생의 ${a}`;

            const weatherLayer = document.getElementById('weather-layer');
            if (!weatherLayer) {
                const wl = document.createElement('div');
                wl.id = 'weather-layer';
                field.appendChild(wl);
            }
            const wl = document.getElementById('weather-layer');
            wl.innerHTML = "";

            if (mapName === 'polar') createSnow(wl);
            else if (mapName === 'desert') {
                const sand = document.createElement('div');
                sand.className = 'sand-wind';
                wl.appendChild(sand);
            }

            document.getElementById('enemy-hp').style.width = '100%';
            document.getElementById('enemy-hp').style.background = '#22c55e';
            document.getElementById('action-menu').style.display = 'none';
            document.getElementById('enemy-hp-panel').style.display = 'none';
            document.getElementById('player-hp-panel').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('msg-box-battle').classList.remove('split');

            const j = (a.charCodeAt(a.length - 1) - 44032) % 28 > 0 ? '이' : '가';
            type(`앗! 야생의\n${a}${j}\n나타났다!`, () => {
                document.getElementById('battle-text').innerHTML += '<br><span class="blink-cursor">▼</span><span style="display:block;text-align:center;font-size:14px;color:#888;margin-top:6px;">화면을 탭하세요</span>';
                wait = true;
                document.getElementById('ui-panel').classList.add('waiting');
            });
        }

        document.getElementById('ui-panel').onclick = () => {
            if (wait) {
                wait = false;
                document.getElementById('ui-panel').classList.remove('waiting');
                document.getElementById('enemy-hp-panel').style.display = 'block';
                document.getElementById('player-hp-panel').style.display = 'block';
                document.getElementById('msg-box-battle').classList.add('split');
                document.getElementById('action-menu').style.display = 'grid';
                document.getElementById('battle-text').innerText = "무엇을 할까?";
            }
        };

        function startQuiz(e) {
            e.stopPropagation();
            if (stg >= currentBattleQuizzes.length) { 
                document.getElementById('battle-text').innerText = "이미 지쳤다! 아이템을 쓰자!";
                return;
            }
            document.getElementById('action-menu').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'grid';
            loadQ();
        }

        function loadQ() {
            const q = currentBattleQuizzes[stg];
            document.getElementById('battle-text').innerText = q.q;
            const box = document.getElementById('quiz-box');
            box.innerHTML = '';

            let removedIdx = -1;
            if (isObserveBuffActive) {
                let wrongIdx = [];
                q.o.forEach((opt, idx) => { if (idx !== q.a) wrongIdx.push(idx); });
                if (wrongIdx.length > 0) {
                    removedIdx = wrongIdx[Math.floor(Math.random() * wrongIdx.length)];
                }
                isObserveBuffActive = false; 
            }

            q.o.forEach((o, i) => {
                const d = document.createElement('div');
                d.className = 'menu-item';
                if (i === removedIdx) {
                    d.innerText = "❌ (관찰함)";
                    d.style.color = "#ccc"; 
                    d.style.pointerEvents = "none"; 
                } else {
                    d.onclick = (e) => { e.stopPropagation(); ans(i); };
                    d.innerText = o;
                }
                box.appendChild(d);
            });
        }

        function ans(i) {
            document.getElementById('quiz-box').style.pointerEvents = 'none';
            if (i === currentBattleQuizzes[stg].a) { 
                document.getElementById('battle-text').innerText = "정답이다! 동물의 체력이 깎였다!";

                const enemySprite = document.getElementById('enemy-sprite');
                if (enemySprite) {
                    enemySprite.classList.add('monster-hit');
                    setTimeout(() => enemySprite.classList.remove('monster-hit'), 400);
                }

                const totalQuizzes = currentBattleQuizzes.length; 
                const dmg = Math.floor(70 / totalQuizzes);
                hp -= dmg;

                const enemyHpBar = document.getElementById('enemy-hp');
                updateHpBar(enemyHpBar, hp);

                stg++;
                setTimeout(() => {
                    if (stg >= currentBattleQuizzes.length) { 
                        document.getElementById('battle-text').innerText = "지쳤다! 가방을 열자!";
                        hp = 30;
                        updateHpBar(enemyHpBar, hp);
                        resetBattleMenu();
                    } else {
                        loadQ();
                        document.getElementById('quiz-box').style.pointerEvents = 'auto';
                    }
                }, 1500);
            } else {
                document.getElementById('battle-text').innerText = "틀렸어!";
                setTimeout(() => {
                    let runAwayRate = Math.max(0.05, 0.30 - (pLevel * 0.02));
                    if (Math.random() < runAwayRate) res(false);
                    else {
                        document.getElementById('battle-text').innerText = "다시 해봐!";
                        setTimeout(() => { loadQ(); document.getElementById('quiz-box').style.pointerEvents = 'auto'; }, 1000);
                    }
                }, 1000);
            }
        }

        function openBag(e) {
            e.stopPropagation();
            document.getElementById('action-menu').style.display = 'none';
            const box = document.getElementById('quiz-box');
            box.style.display = 'grid'; box.innerHTML = '';
            Object.keys(inventory).forEach(item => {
                const d = document.createElement('div');
                d.className = 'menu-item';
                d.innerText = `${item} (${inventory[item]})`; 
                if (inventory[item] > 0) d.onclick = (event) => { event.stopPropagation(); useItem(item); };
                else d.style.color = '#ccc';
                box.appendChild(d);
            });
            const backBtn = document.createElement('div');
            backBtn.className = 'menu-item';
            backBtn.innerText = `돌아가기`; 
            backBtn.onclick = (event) => { event.stopPropagation(); resetBattleMenu(); };
            box.appendChild(backBtn);
        }

        function useItem(itemName) {
            inventory[itemName]--; saveGame();

            document.getElementById('quiz-box').style.display = 'none';
            const msgBox = document.getElementById('msg-box-battle');
            msgBox.classList.remove('split');

            document.getElementById('battle-text').innerText = `${itemName} 던졌다!`;

            const enemySprite = document.getElementById('enemy-sprite');
            if (enemySprite) {
                enemySprite.classList.add('monster-caught');
                setTimeout(() => enemySprite.classList.remove('monster-caught'), 600);
            }

            setTimeout(() => {
                const targetHabitat = animalDB[curA].habitat;
                let isEffective = false, catchRate = 0;
                if (itemName === "포충망" && (targetHabitat === "화단" || targetHabitat === "땅속")) isEffective = true;
                else if (itemName === "물고기 떡밥" && (targetHabitat === "연못" || targetHabitat === "바다")) isEffective = true;
                else if (itemName === "특제 영양식" && (targetHabitat === "사막" || targetHabitat === "극지" || targetHabitat === "바다")) isEffective = true;

                if (!isEffective && itemName !== "마스터 포충망") {
                    document.getElementById('battle-text').innerText = "전혀 관심이 없다...";
                    setTimeout(() => {
                        msgBox.classList.add('split'); 
                        resetBattleMenu();
                    }, 1500);
                    return;
                }

                let baseCatchRate = (hp < 40 ? 0.9 : 0.2); 
                let levelBonus = Math.min(0.2, pLevel * 0.02); 
                catchRate = baseCatchRate + levelBonus;

                if (itemName === "마스터 포충망") { catchRate = 1.0; }

                document.getElementById('battle-text').innerText = "흔들... 흔들...";

                setTimeout(() => {
                    if (Math.random() < catchRate) {
                        res(true); 
                    } else {
                        document.getElementById('battle-text').innerText = "앗! 아깝다!\n동물이 도망쳐 버렸다!";
                        if (enemySprite) enemySprite.style.opacity = "0";

                        setTimeout(() => {
                            msgBox.classList.add('split');
                            if (enemySprite) enemySprite.style.opacity = "1";
                            exitB(); 
                        }, 2000);
                    }
                }, 1500);
            }, 1000);
        }

        function res(w) {
            const o = document.getElementById('result-overlay'), m = document.getElementById('result-msg');
            o.style.display = 'flex';
            const enemySprite = document.getElementById('enemy-sprite');
            const msgBox = document.getElementById('msg-box-battle');

            if (w) {
                animalDB[curA].isCaught = true;
                m.innerHTML = `신난다!<br>${curA} 포획!<br><span style="color:#4ade80;font-size:20px">[도감 등록]</span>`;
                if (enemySprite) enemySprite.style.opacity = "0"; 
                saveGame(); gainExp(50);
                setTimeout(() => { checkBadges(); }, 1000);
            } else {
                m.innerHTML = `앗!<br>${curA} 도망갔어...`;
            }

            setTimeout(() => {
                o.style.display = 'none';
                msgBox.classList.add('split'); 
                if (enemySprite) enemySprite.style.opacity = "1"; 
                exitB(); 
            }, 2000);
        }

        function runAway(e) {
            e.stopPropagation();
            document.getElementById('battle-text').innerText = "도망쳤다!";
            setTimeout(() => { exitB(); }, 1000);
        }

        function resetBattleMenu() {
            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('action-menu').style.display = 'grid';
            document.getElementById('battle-text').innerText = "무엇을 할까?";
            document.getElementById('quiz-box').style.pointerEvents = 'auto';
        }

        function exitB() {
            document.getElementById('battle-view').style.display = 'none';
            document.getElementById('map-view').style.display = 'flex';
            locked = false; draw();
        }

        function type(t, cb) {
            let i = 0;
            const el = document.getElementById('battle-text');
            const msgBox = document.getElementById('msg-box-battle'); 
            el.innerHTML = "";

            const iv = setInterval(() => {
                if (i < t.length) {
                    el.innerHTML += (t[i] === '\n' ? '<br>' : t[i]);
                    i++;
                    if (msgBox) msgBox.scrollTop = msgBox.scrollHeight;
                }
                else {
                    clearInterval(iv);
                    if (cb) cb();
                }
            }, 40);
        }

        function createSnow(container) {
            for (let i = 0; i < 30; i++) {
                const snow = document.createElement('div'); snow.className = 'snow-particle';
                const size = Math.random() * 5 + 2 + 'px'; snow.style.width = size; snow.style.height = size;
                snow.style.left = Math.random() * 100 + '%'; snow.style.animationDuration = Math.random() * 3 + 2 + 's';
                snow.style.animationDelay = Math.random() * 2 + 's'; container.appendChild(snow);
            }
        }

        function openPokedex() { document.getElementById('map-view').style.display = 'none'; document.getElementById('pokedex-view').style.display = 'flex'; updateDex(); }
        function closePokedex() { document.getElementById('pokedex-view').style.display = 'none'; document.getElementById('map-view').style.display = 'flex'; }
        function updateDex() {
            const l = document.getElementById('dex-list');
            l.innerHTML = '';
            let caughtCount = 0;
            const animals = Object.keys(animalDB);
            animals.forEach(k => {
                const d = animalDB[k];
                if (d.isCaught) caughtCount++;
                const i = document.createElement('div');
                i.className = 'dex-item';
                i.onclick = () => {
                    document.querySelectorAll('.dex-item').forEach(el => el.classList.remove('active'));
                    i.classList.add('active');
                    showDex(k);
                };
                i.innerHTML = `<span>${d.isCaught ? d.icon : '❓'}</span> ${d.isCaught ? k : '----------'}`;
                l.appendChild(i);
            });
            document.getElementById('dex-count').innerText = `발견: ${caughtCount}/${animals.length}`;
            renderBadges();
            showDex(animals[0]);
        }

        function showDex(k) {
            const d = animalDB[k];
            if (d.isCaught) {
                document.getElementById('dex-image').style.backgroundImage = `url('static/${fullFileMap[k]}')`;
                document.getElementById('dex-no').innerText = `No. ${String(d.id).padStart(3, '0')}`;
                document.getElementById('dex-name').innerText = k;
                document.getElementById('dex-habitat').innerText = `서식지: ${d.habitat}`;
                document.getElementById('dex-look').innerText = d.look;
                document.getElementById('dex-move').innerText = d.move;
                document.getElementById('dex-trait').innerText = d.trait;
            } else {
                document.getElementById('dex-image').style.backgroundImage = 'none';
                document.getElementById('dex-name').innerText = "???";
                document.getElementById('dex-habitat').innerText = "데이터 없음";
                document.getElementById('dex-look').innerText = "---";
                document.getElementById('dex-move').innerText = "---";
                document.getElementById('dex-trait').innerText = "야생에서 발견하여 데이터를 수집하십시오.";
            }
        }

        window.onkeydown = (e) => {
            const k = e.key; let dx = 0, dy = 0; const p = document.getElementById('player');
            if (k === 'ArrowDown') { dy = 1; charDir = 0; p.style.transform = "scaleX(1)"; p.style.clipPath = "none"; }
            if (k === 'ArrowLeft') { dx = -1; charDir = 1; p.style.transform = "scaleX(1)"; p.style.clipPath = "none"; }
            if (k === 'ArrowRight') { dx = 1; charDir = 1; p.style.transform = "scaleX(-1)"; p.style.clipPath = "none"; }
            if (k === 'ArrowUp') { dy = -1; charDir = 3; p.style.transform = "scaleX(1)"; p.style.clipPath = "none"; }
            if (dx !== 0 || dy !== 0) {
                e.preventDefault();
                charFrame = (charFrame + 1) % 6;
                p.style.backgroundPosition = `${charFrame * 20}% ${charDir * 33.33}%`;
                move(dx, dy);
            }
        };
        window.onkeyup = (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                charFrame = 0;
                document.getElementById('player').style.backgroundPosition = `0% ${charDir * 33.33}%`;
            }
        };

        window.onload = () => {
            loadGame();

            const startGame = () => {
                if (!isTutorialDone) {
                    msg(`⚡ <b>오프닝 튜토리얼</b><br>화면 아무 곳이나 가고 싶은 방향으로 터치(클릭)해서 <b>[👨‍🔬 박사님]</b>께 말을 거세요!`);
                } else {
                    msg(`👦 <b>${playerName}</b> 탐험가님, 환영합니다! 아래쪽 🌀포탈을 통해 바깥세상을 탐험하세요!`);
                }
                draw();
                updatePlayerUI();
                initHybridControls();
            };

            if (!localStorage.getItem('beastGame_player') || playerName === "탐험가" || !isTutorialDone) {
                localStorage.clear();
                inventory = { "포충망": 0, "물고기 떡밥": 10, "특제 영양식": 10, "마스터 포충망": 0 };
                pLevel = 1; pExp = 0; maxExp = 100; earnedBadges = [];
                mapName = 'lab'; px = 7; py = 12; charDir = 3; curMap = lab;
                isTutorialDone = false;

                draw(); updatePlayerUI(); initHybridControls();

                showNamePrompt("과학실에 오신 것을 환영합니다!\n당신의 탐험가 이름을 입력하세요!", "홍길동", (nameInput) => {
                    playerName = (nameInput && nameInput.trim()) ? nameInput.trim() : "지우";
                    saveGame();
                    msg(`⚡ <b>오프닝 튜토리얼</b><br>화면 아무 곳이나 가고 싶은 방향으로 터치(클릭)해서 <b>[👨‍🔬 박사님]</b>께 말을 거세요!`);
                });
            } else {
                startGame();
            }
        };

        function updateHpBar(bar, hpPercent) {
            if (!bar) return;
            bar.style.width = hpPercent + '%';
            if (hpPercent > 60) {
                bar.style.background = '#35c759';
            } else if (hpPercent > 30) {
                bar.style.background = '#ffcc00';
            } else {
                bar.style.background = '#ff3b30';
            }
        }
    </script>
</body>
</html>
